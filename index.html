<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relaxation Breathing</title>
    <meta name="description" content="Helping Relaxation Breathing for Stress, Anxiety and Panic">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f7;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* 메인 화면 요소 */
        #main-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
            font-weight: normal;
            animation: fadeInUp 1s ease-out forwards;
        }

        .button-container {
            display: flex;
            gap: 20px;
        }

        .breath-button {
            background-color: white;
            border: none;
            border-radius: 24px;
            padding: 30px 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s ease;
        }

        .breath-button:hover {
            transform: translateY(-5px);
        }

        .breath-button .material-symbols-rounded {
            font-size: 50px;
            color: #5c6bc0;
            margin-bottom: 12px;
        }

        .breath-button span:last-child {
            font-size: 18px;
            font-weight: bold;
            color: #555;
        }

        /* 호흡 화면 요소 (초기 숨김) */
        #breath-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* 사각형 궤도 */
        .box-track {
            width: 240px;
            height: 240px;
            border: 2px solid #ddd;
            border-radius: 8px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 이동하는 작은 원 */
        .dot {
            width: 20px;
            height: 20px;
            background-color: #5c6bc0;
            border-radius: 50%;
            position: absolute;
            top: -10px;
            left: -10px;
            /* 애니메이션: 이름, 16초 주기, 등속도, 무한반복 */
            animation: moveAroundBox 16s linear infinite;
            /* 초기 상태: 애니메이션 일시 정지 */
            animation-play-state: paused; 
        }

        /* 궤도 이동 키프레임 (좌하단 시작 -> 좌상단 -> 우상단 -> 우하단 -> 좌하단) */
        @keyframes moveAroundBox {
            0%   { transform: translate(0, 240px); }          /* 시작점: 왼쪽 아래 */
            25%  { transform: translate(0, 0); }              /* 1단계 (들이쉬기): 왼쪽 위로 이동 */
            50%  { transform: translate(240px, 0); }          /* 2단계 (참기): 오른쪽 위로 이동 */
            75%  { transform: translate(240px, 240px); }      /* 3단계 (내쉬기): 오른쪽 아래로 이동 */
            100% { transform: translate(0, 240px); }          /* 4단계 (참기): 왼쪽 아래로 복귀 */
        }

        /* 중앙 지시 텍스트 */
        #instruction-text {
            font-size: 24px;
            color: #333;
            font-weight: bold;
            transition: opacity 0.5s ease;
            opacity: 1;
        }

        /* 텍스트 페이드 아웃 상태 클래스 */
        .fade-out {
            opacity: 0 !important;
        }
        
        /* 돌아가기 버튼 */
        #btn-back {
            margin-top: 40px;
            padding: 10px 20px;
            background: none;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="main-screen">
        <h1>지금 어떤 상태이신가요?</h1>
        <div class="button-container">
            <button class="breath-button" id="btn-stress">
                <span class="material-symbols-rounded">water_drop</span>
                <span>Stress</span>
            </button>
        </div>
    </div>

    <div id="breath-screen">
        <div class="box-track">
            <div class="dot" id="breathing-dot"></div>
            <div id="instruction-text">준비</div>
        </div>
        <button id="btn-back">뒤로 가기</button>
    </div>

    <script>
        const mainScreen = document.getElementById('main-screen');
        const breathScreen = document.getElementById('breath-screen');
        const btnStress = document.getElementById('btn-stress');
        const btnBack = document.getElementById('btn-back');
        const dot = document.getElementById('breathing-dot');
        const textEl = document.getElementById('instruction-text');

        let breathInterval;
        const phases = ['들이쉬기', '참기', '내쉬기', '참기'];

        // Stress 버튼 클릭 시 화면 전환 및 애니메이션 시작
        btnStress.addEventListener('click', () => {
            // 메인 화면 페이드 아웃
            mainScreen.style.opacity = '0';
            
            setTimeout(() => {
                mainScreen.style.display = 'none';
                breathScreen.style.display = 'flex';
                
                // 호흡 화면 페이드 인
                setTimeout(() => {
                    breathScreen.style.opacity = '1';
                    startBreathingCycle();
                }, 50);
            }, 500);
        });

        // 호흡 사이클 시작 함수
        function startBreathingCycle() {
            let step = 0;
            
            // 텍스트 초기화 및 애니메이션 실행
            textEl.innerText = phases[step];
            dot.style.animationPlayState = 'running';

            // 4초(4000ms)마다 텍스트 변경
            breathInterval = setInterval(() => {
                // 1. 텍스트 페이드 아웃
                textEl.classList.add('fade-out');
                
                // 2. 0.5초(페이드아웃 시간) 후 텍스트 내용 변경 및 페이드 인
                setTimeout(() => {
                    step = (step + 1) % phases.length;
                    textEl.innerText = phases[step];
                    textEl.classList.remove('fade-out');
                }, 500);
                
            }, 4000);
        }

        // 뒤로 가기 버튼 로직
        btnBack.addEventListener('click', () => {
            clearInterval(breathInterval);
            dot.style.animationPlayState = 'paused';
            dot.style.animation = 'none'; // 애니메이션 초기화
            // 리플로우 강제 발생시켜 애니메이션 재설정 준비
            void dot.offsetWidth;
            dot.style.animation = 'moveAroundBox 16s linear infinite';
            dot.style.animationPlayState = 'paused';

            breathScreen.style.opacity = '0';
            
            setTimeout(() => {
                breathScreen.style.display = 'none';
                mainScreen.style.display = 'flex';
                setTimeout(() => {
                    mainScreen.style.opacity = '1';
                }, 50);
            }, 500);
        });
    </script>
</body>
</html>
